<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer shield -->
  <path d="M100 10 L170 40 L170 110 C170 148 138 178 100 190 C62 178 30 148 30 110 L30 40 Z"
        fill="url(#shieldGrad)" stroke="url(#strokeGrad)" stroke-width="2"/>

  <!-- Inner shield glow ring -->
  <path d="M100 24 L158 50 L158 110 C158 141 132 166 100 176 C68 166 42 141 42 110 L42 50 Z"
        fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>

  <!-- Horizontal scan lines -->
  <line x1="38" y1="80"  x2="162" y2="80"  stroke="#00d4ff" stroke-width="0.8" opacity="0.25"/>
  <line x1="38" y1="100" x2="162" y2="100" stroke="#00d4ff" stroke-width="0.8" opacity="0.25"/>
  <line x1="38" y1="120" x2="162" y2="120" stroke="#00d4ff" stroke-width="0.8" opacity="0.25"/>
  <line x1="38" y1="140" x2="162" y2="140" stroke="#00d4ff" stroke-width="0.8" opacity="0.15"/>

  <!-- Target reticle — outer ring -->
  <circle cx="100" cy="105" r="32" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <!-- Target reticle — inner ring -->
  <circle cx="100" cy="105" r="18" stroke="#00ff88" stroke-width="1.5" opacity="0.8"/>
  <!-- Target reticle — center dot -->
  <circle cx="100" cy="105" r="5" fill="#00ff88"/>
  <!-- Glow on center -->
  <circle cx="100" cy="105" r="5" fill="#00ff88" opacity="0.6" filter="url(#glow)"/>

  <!-- Crosshair lines -->
  <line x1="100" y1="68"  x2="100" y2="80"  stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="130" x2="100" y2="142" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="63"  y1="105" x2="75"  y2="105" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="125" y1="105" x2="137" y2="105" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Corner brackets on shield -->
  <polyline points="46,56 46,48 54,48" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <polyline points="154,56 154,48 146,48" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Gradients & filters -->
  <defs>
    <linearGradient id="shieldGrad" x1="100" y1="10" x2="100" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.18"/>
      <stop offset="60%"  stop-color="#0d1526" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#070b14"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="100" y1="10" x2="100" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>